<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero IA Pro - Design Options (Round 2)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&family=Rajdhani:wght@500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .font-tech {
            font-family: 'Rajdhani', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 p-8">
    <h1 class="text-3xl font-bold text-center mb-8 text-black">Nuevas Propuestas: Aero IA Pro</h1>

    <div class="grid lg:grid-cols-3 gap-8">

        <!-- OPTION 3: NEBULA (Cyber/Void) -->
        <div class="bg-[#090014] p-6 rounded-3xl shadow-2xl relative overflow-hidden ring-4 ring-[#090014]">
            <div class="absolute inset-0 opacity-20"
                style="background-image: linear-gradient(#d946ef 1px, transparent 1px), linear-gradient(90deg, #d946ef 1px, transparent 1px); background-size: 30px 30px;">
            </div>

            <div
                class="absolute top-4 right-4 text-xs font-bold text-fuchsia-500 uppercase tracking-widest relative z-10">
                Opción 3: Nebula</div>

            <div class="flex items-center justify-between mb-8 border-b border-fuchsia-900/50 pb-4 relative z-10">
                <div class="flex items-center gap-2">
                    <div
                        class="w-8 h-8 bg-fuchsia-600 rounded-lg flex items-center justify-center font-bold text-white shadow-[0_0_15px_rgba(217,70,239,0.5)]">
                        AI</div>
                    <span class="text-fuchsia-400 font-bold tracking-wider font-tech text-xl">AERO.SYS</span>
                </div>
            </div>

            <div class="bg-indigo-950/30 border border-fuchsia-500/30 rounded-xl p-6 relative z-10 backdrop-blur-md">
                <h2 class="text-2xl text-white font-bold mb-2 flex items-center gap-2">
                    <span class="text-fuchsia-500">◈</span> Falcon Eye
                </h2>
                <div
                    class="h-32 bg-black/50 rounded border border-fuchsia-900/50 mb-4 flex items-center justify-center">
                    <span class="text-fuchsia-500/50 font-mono text-xs animate-pulse">Scanning...</span>
                </div>
                <button
                    class="bg-fuchsia-600 hover:bg-fuchsia-500 text-white font-bold py-2 px-4 rounded-lg transition-all shadow-[0_0_20px_rgba(217,70,239,0.4)] w-full font-tech tracking-wider">
                    INITIATE SCAN
                </button>
            </div>
            <div class="mt-4 text-center relative z-10">
                <p class="text-fuchsia-300/50 text-xs uppercase">Mysterious • High-Tech</p>
            </div>
        </div>

        <!-- OPTION 4: EXECUTIVE (Gold/Carbon) -->
        <div class="bg-[#0a0a0a] p-6 rounded-3xl shadow-2xl relative overflow-hidden ring-4 ring-[#0a0a0a]">
            <!-- Carbon Fiber Texture Mock -->
            <div class="absolute inset-0 opacity-5"
                style="background-image: radial-gradient(circle, #fbbf24 1px, transparent 1px); background-size: 4px 4px;">
            </div>

            <div
                class="absolute top-4 right-4 text-xs font-bold text-amber-600 uppercase tracking-widest relative z-10">
                Opción 4: Executive</div>

            <div class="flex items-center justify-between mb-8 border-b border-neutral-800 pb-4 relative z-10">
                <div class="flex items-center gap-2">
                    <div
                        class="w-8 h-8 border border-amber-500/50 rounded-full flex items-center justify-center font-bold text-amber-500">
                        AP</div>
                    <span class="text-amber-500 font-bold tracking-widest text-sm">AERO<span
                            class="text-neutral-500">PRO</span></span>
                </div>
            </div>

            <div class="bg-neutral-900/80 border border-neutral-800 rounded-none p-6 relative z-10">
                <h2 class="text-2xl text-white font-light mb-2 flex items-center gap-2">
                    <span class="text-amber-500">✦</span> Falcon Eye
                </h2>
                <div class="h-32 bg-[#050505] border-l-2 border-amber-600 mb-4 p-4">
                    <span class="text-amber-500/80 font-mono text-xs block">> Status: Ready</span>
                    <span class="text-neutral-500 font-mono text-xs block">> Calibration: 99.9%</span>
                </div>
                <button
                    class="bg-gradient-to-r from-amber-600 to-amber-700 hover:from-amber-500 hover:to-amber-600 text-white font-medium py-2 px-4 rounded-sm transition-all w-full tracking-widest text-xs border border-amber-500/20">
                    AUTHORIZE
                </button>
            </div>
            <div class="mt-4 text-center relative z-10">
                <p class="text-neutral-500 text-xs uppercase">Premium • Industrial</p>
            </div>
        </div>

        <!-- OPTION 5: SONAR (Abyssal Teal) -->
        <div class="bg-[#020b12] p-6 rounded-3xl shadow-2xl relative overflow-hidden ring-4 ring-[#020b12]">
            <div class="absolute inset-0 opacity-20"
                style="background-image: repeating-linear-gradient(0deg, transparent, transparent 19px, #14b8a6 20px); background-size: 100% 20px;">
            </div>

            <div class="absolute top-4 right-4 text-xs font-bold text-teal-400 uppercase tracking-widest relative z-10">
                Opción 5: Sonar</div>

            <div class="flex items-center justify-between mb-8 border-b border-teal-900/50 pb-4 relative z-10">
                <div class="flex items-center gap-2">
                    <div
                        class="w-8 h-8 bg-teal-900/50 border border-teal-500 text-teal-400 rounded flex items-center justify-center font-bold">
                        ●</div>
                    <span class="text-teal-400 font-bold tracking-wider font-mono">CMD_CENTER</span>
                </div>
            </div>

            <div
                class="bg-[#04151f]/90 border border-teal-500/30 rounded-lg p-6 relative z-10 shadow-[0_0_30px_rgba(20,184,166,0.1)]">
                <h2 class="text-2xl text-teal-50 font-bold mb-2 flex items-center gap-2">
                    <span class="text-teal-400 animate-pulse">●</span> Falcon Eye
                </h2>
                <div class="h-32 bg-[#010609] border border-teal-500/20 mb-4 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 bg-teal-500/50 animate-scan"></div>
                    <style>
                        @keyframes scan {
                            0% {
                                top: 0
                            }

                            100% {
                                top: 100%
                            }
                        }
                    </style>
                </div>
                <button
                    class="bg-teal-500/10 hover:bg-teal-500/20 text-teal-400 border border-teal-500 font-bold py-2 px-4 rounded transition-all w-full font-mono hover:shadow-[0_0_15px_rgba(20,184,166,0.4)]">
                    [ RUN_DIAGNOSTICS ]
                </button>
            </div>
            <div class="mt-4 text-center relative z-10">
                <p class="text-teal-700 text-xs uppercase">Technical • Data-First</p>
            </div>
        </div>

    </div>
</body>

</html>
