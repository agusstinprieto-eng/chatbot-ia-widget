<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>AERO-IA-PRO | IA.AGUS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: {
                            black: '#0a0a0f',
                            dark: '#13131f',
                            gray: '#1c1c2e',
                            light: '#2a2a40',
                            blue: '#00f0ff',
                            purple: '#7000ff',
                            pink: '#ff00aa',
                            text: '#e0e0e0'
                        }
                    },
                    fontFamily: {
                        mono: ['JetBrains Mono', 'monospace'],
                        sans: ['Inter', 'sans-serif'],
                        tech: ['Rajdhani', 'sans-serif']
                    },
                    boxShadow: {
                        'neon-blue': '0 0 10px rgba(0, 240, 255, 0.5), 0 0 20px rgba(0, 240, 255, 0.3)',
                        'neon-purple': '0 0 10px rgba(112, 0, 255, 0.5), 0 0 20px rgba(112, 0, 255, 0.3)'
                    }
                }
            }
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&family=Rajdhani:wght@500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0f;
            /* cyber-black */
            color: #e0e0e0;
            /* cyber-text */
            overflow-x: hidden;
            background-image:
                linear-gradient(#1c1c2e 1px, transparent 1px),
                linear-gradient(90deg, #1c1c2e 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center center;
            background-attachment: fixed;
        }

        /* Subtle grid opacity */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0f;
            opacity: 0.94;
            z-index: -1;
            pointer-events: none;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .font-tech {
            font-family: 'Rajdhani', sans-serif;
        }

        /* Glassmorphism Utilities - Manufactura Style */
        .glass-panel {
            background: rgba(19, 19, 31, 0.75);
            /* cyber-dark with opacity */
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 240, 255, 0.2);
            /* cyber-blue border */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .glow-blue {
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
        }

        .glow-text-blue {
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #090014;
        }

        ::-webkit-scrollbar-thumb {
            background: #1e3a8a;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #2563eb;
        }

        /* Global Selector Styling */
        select {
            background-color: #000000 !important;
            color: #ffffff !important;
        }

        option {
            background-color: #000000 !important;
            color: #ffffff !important;
        }
    </style>
    <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "framer-motion": "https://esm.sh/framer-motion@^11.0.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
</body>

</html>
